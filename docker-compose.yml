services:
  vdf-web:
    image: ghcr.io/0x90d/vdf-web:latest
    ports:
      - "8080:8080"
    volumes:
      # Mount your media directories here (read-only recommended).
      # Add as many as you need, e.g.:
      # - /mnt/nas/movies:/mnt/nas/movies:ro
      # - /mnt/nas/series:/mnt/nas/series:ro
      - vdf-db:/root/.config/VDF   # persists settings and scan database

volumes:
  vdf-db:
